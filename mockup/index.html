<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Petal v2 — Multitap Delay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* dark theme */
    --bg-page:    #08080b;
    --bg-plugin:  #0e0e13;
    --bg-panel:   #131319;
    --bg-surface: #1a1a22;
    --bg-elev:    #20202a;
    --line:       #26262f;
    --line-soft:  #1d1d24;
    --ink:        #e9e9f0;
    --ink-dim:    #8c8c9c;
    --ink-faint:  #55555f;
    --accent:     #a06cf0;
    --accent-2:   #c084fc;
    --accent-soft: #2a1f3a;
    --good:       #5cf0a0;
    --warn:       #f0a060;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg-page);
    font-family: 'Geist', 'DM Sans', system-ui, sans-serif; color: var(--ink); }

  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(160,108,240,0.06), transparent 60%),
      var(--bg-page);
  }

  .mono { font-family: 'Geist Mono', 'JetBrains Mono', ui-monospace, monospace; }

  /* === Plugin shell === */
  .plugin {
    width: 1080px;
    height: 540px;
    background: var(--bg-plugin);
    border-radius: 14px;
    border: 1px solid var(--line);
    box-shadow:
      0 30px 80px rgba(0,0,0,0.6),
      0 0 0 1px rgba(255,255,255,0.02) inset,
      0 1px 0 rgba(255,255,255,0.04) inset;
    display: grid;
    grid-template-rows: 40px 1fr;
    grid-template-columns: 1fr;
    overflow: hidden;
  }

  /* ─── Header ─── */
  .header {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    padding: 0 14px;
    border-bottom: 1px solid var(--line);
    gap: 16px;
    background: linear-gradient(180deg, rgba(255,255,255,0.012), transparent);
  }
  .brand { display: flex; align-items: center; gap: 10px; flex-wrap: nowrap; white-space: nowrap; }
  .brand-mark {
    width: 22px; height: 22px; position: relative;
  }
  .brand-mark svg { display: block; }
  .brand-name {
    font-weight: 600; letter-spacing: 0.18em; font-size: 13px;
    text-transform: uppercase;
  }
  .brand-sub {
    font-size: 10px; color: var(--ink-faint); letter-spacing: 0.16em;
    text-transform: uppercase; margin-left: 4px;
  }

  .preset-bar { display: flex; justify-content: center; }
  .preset {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--bg-surface);
    border: 1px solid var(--line);
    border-radius: 999px;
    height: 26px; padding: 0 10px;
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
  }
  .preset .chev {
    width: 18px; height: 18px; display: grid; place-items: center;
    color: var(--ink-dim); cursor: pointer; border-radius: 4px;
  }
  .preset .name { min-width: 130px; text-align: center; color: var(--ink); }

  .header-right { display: flex; align-items: center; gap: 8px; }
  .icon-btn {
    width: 26px; height: 26px; display: grid; place-items: center;
    color: var(--ink-dim); cursor: pointer; border-radius: 6px;
    border: 1px solid transparent;
  }
  .icon-btn:hover { color: var(--ink); border-color: var(--line); background: var(--bg-surface); }
  .icon-btn.active { color: var(--accent-2); background: var(--accent-soft); border-color: var(--accent-soft); }

  /* ─── Body grid: left / center / right ─── */
  .body {
    display: grid;
    grid-template-columns: 220px 1fr 280px;
    height: 100%;
    overflow: hidden;
  }
  .col-left, .col-right { background: var(--bg-panel); }
  .col-left  { border-right: 1px solid var(--line); }
  .col-right { border-left:  1px solid var(--line); }

  /* === Sections === */
  .section {
    border-bottom: 1px solid var(--line-soft);
    padding: 8px 14px;
  }
  .section:last-child { border-bottom: 0; }
  .section-title {
    font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 7px;
    display: flex; justify-content: space-between; align-items: center;
  }

  /* === Knob === */
  .knob {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    user-select: none;
  }
  .knob .dial {
    position: relative; width: 44px; height: 44px;
  }
  .knob.lg .dial { width: 72px; height: 72px; }
  .knob .dial svg { display: block; }
  .knob .lbl { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-dim); }
  .knob .val { font-size: 10px; color: var(--ink); }

  .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* === Segmented control === */
  .seg {
    display: flex; background: var(--bg-surface); border: 1px solid var(--line);
    border-radius: 6px; padding: 2px; gap: 2px;
    height: 26px;
  }
  .seg .opt {
    flex: 1; display: grid; place-items: center;
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-dim); cursor: pointer;
    border-radius: 4px; transition: all .12s;
  }
  .seg .opt:hover { color: var(--ink); }
  .seg .opt.active { background: var(--bg-elev); color: var(--ink); box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset; }
  .seg.accent .opt.active { background: var(--accent); color: #fff; box-shadow: none; }

  /* === Toggle === */
  .toggle {
    display: flex; align-items: center; gap: 8px;
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-dim); cursor: pointer;
  }
  .switch {
    width: 28px; height: 16px; border-radius: 999px;
    background: var(--bg-surface); border: 1px solid var(--line);
    position: relative; transition: all .15s;
  }
  .switch::after {
    content: ''; position: absolute; top: 1px; left: 1px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--ink-dim); transition: all .15s;
  }
  .toggle.on .switch { background: var(--accent); border-color: var(--accent); }
  .toggle.on .switch::after { background: #fff; left: 13px; }
  .toggle.on { color: var(--ink); }

  /* === LEFT COL specifics === */
  .left-hero {
    display: grid;
    grid-template-columns: 1fr 22px 1fr;
    align-items: center;
    gap: 6px;
    padding: 10px 14px 10px;
    border-bottom: 1px solid var(--line-soft);
  }
  .left-hero .time-knob { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .left-hero .time-knob .v   { font-family: 'Geist Mono'; font-size: 13px; letter-spacing: 0.02em; }
  .left-hero .time-knob .lbl { font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); }
  .left-hero .link-time {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: grid; place-items: center; cursor: pointer;
    margin: 0 auto;
    box-shadow: 0 0 6px rgba(160,108,240,0.4);
  }
  .left-hero .link-time.off { background: var(--bg-surface); color: var(--ink-dim); box-shadow: 0 0 0 1px var(--line); }

  .ratio-cell {
    display: flex; flex-direction: column; gap: 6px; align-items: stretch;
  }
  .ratio-cell .ch { font-size: 9px; letter-spacing: 0.2em; color: var(--ink-faint); text-transform: uppercase; }
  .pill {
    background: var(--bg-surface); border: 1px solid var(--line); border-radius: 4px;
    height: 22px; display: flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 11px; cursor: pointer;
  }
  .pill .v { font-family: 'Geist Mono'; }
  .pill .chev { color: var(--ink-faint); }

  /* === CENTER === */
  .col-center { display: grid; grid-template-rows: 36px 1fr auto; overflow: hidden; background: var(--bg-plugin); min-height: 0; }
  .viz-tabs {
    display: flex; align-items: center; padding: 0 16px;
    border-bottom: 1px solid var(--line);
    gap: 24px;
    background: var(--bg-panel);
  }
  .viz-tabs .tab {
    height: 36px; display: flex; align-items: center; gap: 8px;
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-dim); cursor: pointer; position: relative;
  }
  .viz-tabs .tab.active { color: var(--ink); }
  .viz-tabs .tab.active::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: -1px;
    height: 2px; background: var(--accent);
  }
  .viz-tabs .meta { margin-left: auto; display: flex; align-items: center; gap: 14px; font-size: 10px; color: var(--ink-dim); letter-spacing: 0.14em; text-transform: uppercase; }
  .viz-tabs .meta .v { font-family: 'Geist Mono'; color: var(--ink); }
  .viz-tabs .meta .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  .viz {
    position: relative; overflow: hidden;
    min-height: 0;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.01), transparent 30%),
      var(--bg-plugin);
  }
  .viz svg { width: 100%; height: 100%; display: block; }

  /* === Bottom shaping strip === */
  .shaping {
    height: 118px;
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 0;
    border-top: 1px solid var(--line);
    background: var(--bg-panel);
  }
  .xy-pad {
    position: relative; margin: 8px;
    background: var(--bg-surface);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
  }
  .xy-pad + .xy-pad { margin-left: 0; }
  .xy-pad .ch-tag {
    position: absolute; top: 8px; left: 10px; font-size: 9px;
    letter-spacing: 0.2em; color: var(--ink-faint);
  }
  .xy-pad .corner-tag {
    position: absolute; bottom: 6px; font-size: 9px; color: var(--ink-faint);
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .xy-pad .corner-tag.l { left: 10px; }
  .xy-pad .corner-tag.r { right: 10px; }
  .xy-pad svg { position: absolute; inset: 0; width: 100%; height: 100%; }

  .shaping-right {
    width: 56px; padding: 8px 0;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    border-left: 1px solid var(--line);
  }
  .link-btn {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: grid; place-items: center; cursor: pointer;
    box-shadow: 0 0 10px rgba(160,108,240,0.35), 0 0 0 3px rgba(160,108,240,0.08);
  }
  .link-btn.off { background: var(--bg-surface); color: var(--ink-dim); box-shadow: 0 0 0 1px var(--line); }

  /* === RIGHT COL === */
  .right-tabs {
    display: grid; grid-template-columns: repeat(6, 1fr);
    border-bottom: 1px solid var(--line);
    height: 34px;
  }
  .right-tab {
    display: grid; place-items: center; cursor: pointer;
    font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-dim);
    position: relative;
  }
  .right-tab svg { display: block; }
  .right-tab.active { color: var(--ink); }
  .right-tab:hover { color: var(--ink); }
  .right-tab.active::after {
    content: ''; position: absolute; left: 20%; right: 20%; bottom: -1px;
    height: 2px; background: var(--accent);
  }
  .right-tab .tip {
    position: absolute; top: 36px; left: 50%; transform: translateX(-50%);
    background: var(--bg-elev); border: 1px solid var(--line); border-radius: 4px;
    font-size: 9px; padding: 3px 6px; color: var(--ink); white-space: nowrap;
    opacity: 0; pointer-events: none; transition: opacity .12s;
    letter-spacing: 0.1em; text-transform: uppercase; z-index: 10;
  }
  .right-tab:hover .tip { opacity: 1; }

  .right-body {
    height: calc(100% - 34px - 70px);
    overflow-y: auto;
    padding: 10px 12px;
    scrollbar-width: thin;
  }
  .right-body::-webkit-scrollbar { width: 6px; }
  .right-body::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

  /* per-tap rows */
  .tap-row {
    display: grid;
    grid-template-columns: 14px 14px 1fr 44px;
    align-items: center;
    gap: 10px;
    height: 26px;
    padding: 0 8px;
    border-radius: 5px;
    background: var(--bg-surface);
    border: 1px solid var(--line-soft);
    margin-bottom: 4px;
    transition: background .12s;
  }
  .tap-row.off { opacity: 0.4; }
  .tap-row .num { font-size: 10px; color: var(--ink-faint); font-family: 'Geist Mono'; }
  .tap-row .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); border: 1px solid var(--accent);
    box-shadow: 0 0 6px rgba(160,108,240,0.5); cursor: pointer;
  }
  .tap-row.off .dot { background: transparent; border-color: var(--line); box-shadow: none; }

  .stepper { display: flex; align-items: center; gap: 8px; }
  .stepper .b {
    width: 18px; height: 18px; border-radius: 4px;
    background: var(--bg-elev); border: 1px solid var(--line);
    display: grid; place-items: center; cursor: pointer;
    font-size: 11px; color: var(--ink-dim);
  }
  .stepper .b:hover { color: var(--ink); }
  .stepper .v {
    flex: 1; text-align: center; font-family: 'Geist Mono'; font-size: 11px;
  }
  .stepper .v.pitched { color: var(--accent-2); }

  .mini-slider {
    position: relative; height: 4px; border-radius: 2px;
    background: var(--bg-elev); border: 1px solid var(--line);
  }
  .mini-slider .fill {
    position: absolute; top: 0; bottom: 0; background: var(--accent); border-radius: 2px;
  }
  .mini-slider .thumb {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    width: 10px; height: 10px; border-radius: 50%;
    background: #fff; border: 1px solid var(--accent);
    box-shadow: 0 0 4px rgba(160,108,240,0.4);
  }
  .slider-val { font-family: 'Geist Mono'; font-size: 10px; color: var(--ink); text-align: right; }

  .unit { font-size: 9px; color: var(--ink-faint); }

  /* Right footer: feedback + tap count */
  .right-footer {
    height: 70px;
    border-top: 1px solid var(--line);
    padding: 8px 12px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    align-items: center;
  }
  .fbk-block { display: flex; align-items: center; gap: 8px; }
  .fbk-block .knob { flex-shrink: 0; }
  .fbk-block .stack { display: flex; flex-direction: column; gap: 1px; }
  .fbk-block .stack .lbl { font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); }
  .fbk-block .stack .val { font-family: 'Geist Mono'; font-size: 13px; }

  .count-block {
    text-align: right;
    display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
  }
  .count-block .lbl { font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); }
  .count-block .val { font-family: 'Geist Mono'; font-size: 22px; color: var(--accent-2); font-weight: 600; line-height: 1; }
  .count-block .controls { display: inline-flex; gap: 4px; }
  .count-block .b {
    width: 18px; height: 18px; background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: 4px; display: grid; place-items: center; cursor: pointer;
    font-size: 11px; color: var(--ink-dim);
  }

  /* footer thin status */
  .status-bar {
    position: absolute; left: 0; right: 0; bottom: 0; height: 0;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="petal-app.jsx"></script>
</head>
<body>
<div id="root"></div>
</body>
</html>
